<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt arial;
            background: rgb(81, 11, 81);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="saiu()">interaja
    </div>

    <script>
        let a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', saiu)

        function clicar() {
            a.innerText = 'clicou'
            a.style.background = 'blue'
        }

        function entrar() {
            a.innerText = 'entrou'
            a.style.background = 'red'
        }

        function saiu() {
            a.innerText = 'saiu'
            a.style.background = 'yellow'
        }
    </script>
</body>
</html>
