<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javinha d cria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(32, 32, 144);
            color: white;

        }

        main {
            background-color: rgb(21, 21, 104);
            border-radius: 15px;
            border: 3px solid black;
            width: 70%;
            padding: 40px 0px;
            text-align: center;
            margin: 30% auto;
            box-shadow: 0px 15px 15px rgba(0, 0, 0, 0.522);
        }

        h1 {
            margin-bottom: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type='number'] {
            margin-bottom: 10px;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.385);
            border: none;
            padding: 5px;
            width: 100px;
        }

        input[type='button'] {
            margin-top: 15px;
            padding: 8px;
            width: 120px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 15px 25px rgba(0, 0, 0, 0.741);
            background-color: rgb(71, 71, 194);
            font-family: monospace;
            transition-duration: .5s;
        }

        input[type='button']:hover {
            transform: scale(1.3);
            cursor: pointer;
            transition-duration: .5s;
        }
    </style>
</head>
<body>
    <main>
        <h1>Somando Valores:</h1>

        <input type="number" name="inpt1" id="inpt1"> <br>
        <input type="number" name="inpt2" id="inpt2"> <br>

        <input type="button" value="Somar" onclick="s=somar()"> <br>
        <br>
        <div id="res"></div>
    </main>

    <script>
        function somar() {
            let put1 = document.getElementById('inpt1')
            let put2 = document.getElementById('inpt2')
            let resul = document.getElementById('res')

                let valor1 = Number(put1.value)
                let valor2 = Number(put2.value)

                    let resultado = valor1 + valor2

        res.innerHTML = `O valor: ${valor1} eo valor: ${valor2}, somados resultam em:  ${resultado}`;
        }
    </script>
</body>
</html>
