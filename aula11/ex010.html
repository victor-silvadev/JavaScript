<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>sistema de multas</h1>

    Velocidade do carro: <input type="number" id="txtvel">
    <input type="button" value="Verificar" onclick="calcular()">

    <div id="res"></div>

    <script>
        
        function calcular() {
            let txtv = document.getElementById('txtvel')
            let res = document.getElementById('res')
            let vel = Number(txtv.value)

            res.innerHTML = `<p>Sua velocidade e de <strong>${vel} kms/h</strong></p>`
            if (vel > 80) {
                res.innerHTML = `<p>Voce esta MULTADO por ecesso de velocidade<p/>`
            }
            res.innerHTML += `<p>Dirija sempre dentro das leis!</p>`
        }
    </script>
</body>
</html>
